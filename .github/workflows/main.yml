name: 🎮 Windows 11 RDP - Gaming (ULTRA FIXED)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  RDP-Gaming-Setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: ⚖️ Compliance Notice
        shell: powershell
        run: |
          Write-Host "GitHub ToS Compliance" -ForegroundColor Green
          Write-Host "6-hour max runtime enforced" -ForegroundColor Green
          Write-Host ""

      - name: 🔐 Generate Random Password
        shell: powershell
        run: |
          $chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'
          $password = ''
          $random = New-Object Random
          for ($i = 0; $i -lt 12; $i++) {
            $password += $chars[$random.Next($chars.Length)]
          }
          Add-Content -Path $env:GITHUB_ENV -Value "RDP_PASS=$password"
          Write-Host "Password generated: $password" -ForegroundColor Green

      - name: 🌐 Install Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..." -ForegroundColor Cyan
          choco install tailscale -y --no-progress 2>&1 | Out-Null
          Write-Host "Tailscale installed" -ForegroundColor Green
          Start-Sleep -Seconds 3

      - name: 🔐 Tailscale Login (Fast Auth)
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "============================================" -ForegroundColor Magenta
          Write-Host "TAILSCALE AUTHORIZATION STARTING" -ForegroundColor Yellow
          Write-Host "============================================" -ForegroundColor Magenta
          Write-Host ""
          
          try {
            if ("${{ secrets.TAILSCALE_AUTH_KEY }}" -ne "") {
              Write-Host "Using pre-configured auth key..." -ForegroundColor Green
              & "C:\Program Files\Tailscale\tailscale.exe" up --hostname=github-gaming-rdp --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes --accept-dns 2>&1 | Out-Null
              Start-Sleep -Seconds 2
              Write-Host "✅ Tailscale authenticated via auth key!" -ForegroundColor Green
            } else {
              Write-Host "No auth key found. Starting interactive mode..." -ForegroundColor Yellow
              & "C:\Program Files\Tailscale\tailscale.exe" up --hostname=github-gaming-rdp 2>&1
              
              $maxAttempts = 5
              for ($i = 0; $i -lt $maxAttempts; $i++) {
                $status = & "C:\Program Files\Tailscale\tailscale.exe" status 2>&1
                if ($status -match "Active|Logged in") {
                  Write-Host "✅ Device authorized!" -ForegroundColor Green
                  break
                }
                if ($i -lt $maxAttempts - 1) {
                  Start-Sleep -Seconds 2
                }
              }
            }
          } catch {
            Write-Host "Tailscale initialization in progress..." -ForegroundColor Yellow
          }
          
          Write-Host "Proceeding with RDP setup..." -ForegroundColor Green

      - name: 🔐 Enable RDP
        shell: powershell
        run: |
          Write-Host "Enabling RDP..." -ForegroundColor Cyan
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          
          Write-Host "RDP enabled" -ForegroundColor Green

      - name: 🔑 Set RDP Password
        shell: powershell
        run: |
          Write-Host "Setting RDP password..." -ForegroundColor Cyan
          
          $pass = ConvertTo-SecureString "$env:RDP_PASS" -AsPlainText -Force
          Set-LocalUser -Name "Administrator" -Password $pass -ErrorAction SilentlyContinue
          
          Write-Host "Username: Administrator" -ForegroundColor Green
          Write-Host "Password: $env:RDP_PASS" -ForegroundColor Green

      - name: 🎮 Install Gaming Packages
        shell: powershell
        run: |
          Write-Host "Installing gaming packages..." -ForegroundColor Cyan
          
          choco install vcredist-all -y --no-progress 2>&1 | Out-Null
          Write-Host "Visual C++ OK" -ForegroundColor Green
          
          choco install steam -y --no-progress 2>&1 | Out-Null
          Write-Host "Steam OK" -ForegroundColor Green
          
          choco install discord -y --no-progress 2>&1 | Out-Null
          Write-Host "Discord OK" -ForegroundColor Green
          
          choco install googlechrome -y --no-progress 2>&1 | Out-Null
          Write-Host "Chrome OK" -ForegroundColor Green

      - name: 📊 Show Connection Info
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host "GAMING RDP READY!" -ForegroundColor Green
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host ""
          
          $hostname = $env:COMPUTERNAME
          $password = $env:RDP_PASS
          $ip = "Pending"
          
          try {
            $tailscaleIp = & "C:\Program Files\Tailscale\tailscale.exe" ip -4 2>&1
            if ($tailscaleIp -and $tailscaleIp -notmatch "error|Error") {
              $ip = $tailscaleIp.Trim()
            }
          } catch {
            $ip = "Check Tailscale admin console"
          }
          
          Write-Host "Hostname: $hostname" -ForegroundColor Green
          Write-Host "IP Address: $ip" -ForegroundColor Green
          Write-Host "Port: 3389" -ForegroundColor Green
          Write-Host "Username: Administrator" -ForegroundColor Green
          Write-Host "Password: $password" -ForegroundColor Green
          Write-Host ""
          Write-Host "Connection Command: mstsc /v:$ip`:3389" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Games Available: Steam | Discord | Chrome" -ForegroundColor Green
          Write-Host ""
          Write-Host "============================================" -ForegroundColor Cyan

      - name: ♾️ Keep Session Running (6 Hours)
        shell: powershell
        run: |
          Write-Host "Session active - 6 hour maximum" -ForegroundColor Green
          
          $start = Get-Date
          $max = New-TimeSpan -Hours 6
          
          while ((Get-Date) - $start -lt $max) {
            Start-Sleep -Seconds 60
            $elapsed = (Get-Date) - $start
            Write-Host "Running: $($elapsed.Hours)h $($elapsed.Minutes)m" -ForegroundColor Gray
          }
          
          Write-Host "6-hour limit reached" -ForegroundColor Yellow
