name: RDP Skyro Runner

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600 # Maksimal 6 jam (360 menit sebenarnya, tapi 3600 biar aman)

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          $charSet = @{ Upper = [char[]](65..90); Lower = [char[]](97..122); Number = [char[]](48..57); Special = [char[]](33..47) }
          $password = -join (($charSet.Upper | Get-Random -Count 4) + ($charSet.Lower | Get-Random -Count 4) + ($charSet.Number | Get-Random -Count 4) + ($charSet.Special | Get-Random -Count 4) | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "Skyro" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Skyro"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Skyro"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

      - name: Establish Tailscale Connection
        run: |
          $authKey = "${{ secrets.TAILSCALE_AUTH_KEY }}"
          if ($authKey) {
              Write-Host "Key ditemukan, login otomatis..."
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$authKey --hostname=skyro-rdp-${{ github.run_id }}
          } else {
              Write-Host "Key tidak ada, silakan klik link login di bawah ini:"
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --hostname=skyro-rdp-${{ github.run_id }}
          }
          
          # Ambil IP Tailscale
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Maintain Connection (6 Hours)
        run: |
          Write-Host "`n==============================="
          Write-Host "IP ADDRESS : $env:TAILSCALE_IP"
          Write-Host "USERNAME   : Skyro"
          Write-Host "PASSWORD   : $env:RDP_PASS"
          Write-Host "===============================`n"
          Write-Host "Runner akan aktif selama 6 jam..."
          
          $endTime = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $endTime) {
              Write-Host "[$(Get-Date)] Skyro RDP Masih Berjalan..."
              Start-Sleep -Seconds 300
          }
                  Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "UserPreferencesMask" -Value ([byte[]](0x90,0x12,0x03,0x80,0x10,0x00,0x00,0x00))

    - name: Install Chocolatey
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

    - name: Install gaming dependencies + Chrome
      run: |
        choco install vcredist-all -y
        choco install directx -y
        choco install webview2 -y
        choco install googlechrome -y   # <--- Chrome

    - name: Install Roblox
      run: |
        $RobloxLauncher = "$env:TEMP\RobloxPlayerLauncher.exe"
        Invoke-WebRequest -Uri "https://setup.rbxcdn.com/version-da39a3ee5e6b4b0d3255bfef95601890afd80709-RobloxPlayerLauncher.exe" -OutFile $RobloxLauncher
        Start-Process -FilePath $RobloxLauncher -ArgumentList "/SILENT" -Wait
        $RobloxExe = "$env:LOCALAPPDATA\Roblox\Versions\RobloxPlayerLauncher.exe"
        if (Test-Path $RobloxExe) {
          New-Item -ItemType SymbolicLink -Path "$env:USERPROFILE\Desktop\Roblox.lnk" -Target $RobloxExe -Force
        }

    - name: Setup audio for RDP
      run: |
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableAudioCapture" -Value 0
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableAudioPlayback" -Value 0

    - name: Create Chrome shortcut on desktop
      run: |
        $chromePath = "${env:ProgramFiles}\Google\Chrome\Application\chrome.exe"
        if (Test-Path $chromePath) {
          New-Item -ItemType SymbolicLink -Path "$env:USERPROFILE\Desktop\Chrome.lnk" -Target $chromePath -Force
        }

    - name: Show connection info
      run: |
        Write-Host "========================================="
        Write-Host "RDP via Tailscale - Connect using:"
        Write-Host "IP: ${{ env.TAILSCALE_IP }}"
        Write-Host "Username: runneradmin"
        Write-Host "Password: P@ssw0rd123!"
        Write-Host "Port: 3389 (default RDP port, no need to specify)"
        Write-Host ""
        Write-Host "Roblox and Chrome are installed"
        Write-Host "Desktop shortcuts available"
        Write-Host "========================================="

    - name: Keep alive
      run: while ($true) { Start-Sleep -Seconds 300 }      run: |
        powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
        Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2
        Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "EnableTransparency" -Value 0
        Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "UserPreferencesMask" -Value ([byte[]](0x90,0x12,0x03,0x80,0x10,0x00,0x00,0x00))

    - name: Install Chocolatey
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

    - name: Install gaming dependencies + Chrome
      run: |
        choco install vcredist-all -y
        choco install directx -y
        choco install webview2 -y
        choco install googlechrome -y   # <--- Chrome

    - name: Install Roblox
      run: |
        $RobloxLauncher = "$env:TEMP\RobloxPlayerLauncher.exe"
        Invoke-WebRequest -Uri "https://setup.rbxcdn.com/version-da39a3ee5e6b4b0d3255bfef95601890afd80709-RobloxPlayerLauncher.exe" -OutFile $RobloxLauncher
        Start-Process -FilePath $RobloxLauncher -ArgumentList "/SILENT" -Wait
        $RobloxExe = "$env:LOCALAPPDATA\Roblox\Versions\RobloxPlayerLauncher.exe"
        if (Test-Path $RobloxExe) {
          New-Item -ItemType SymbolicLink -Path "$env:USERPROFILE\Desktop\Roblox.lnk" -Target $RobloxExe -Force
        }

    - name: Setup audio for RDP
      run: |
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableAudioCapture" -Value 0
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableAudioPlayback" -Value 0

    - name: Create Chrome shortcut on desktop
      run: |
        $chromePath = "${env:ProgramFiles}\Google\Chrome\Application\chrome.exe"
        if (Test-Path $chromePath) {
          New-Item -ItemType SymbolicLink -Path "$env:USERPROFILE\Desktop\Chrome.lnk" -Target $chromePath -Force
        }

    - name: Show connection info
      run: |
        Write-Host "========================================="
        Write-Host "RDP via Tailscale - Connect using:"
        Write-Host "IP: ${{ env.TAILSCALE_IP }}"
        Write-Host "Username: runneradmin"
        Write-Host "Password: P@ssw0rd123!"
        Write-Host "Port: 3389 (default RDP port, no need to specify)"
        Write-Host ""
        Write-Host "Roblox and Chrome are installed"
        Write-Host "Desktop shortcuts available"
        Write-Host "========================================="

    - name: Keep alive
      run: while ($true) { Start-Sleep -Seconds 300 }          netsh advfirewall set allprofiles state off -ErrorAction SilentlyContinue
          Write-Host "✅ Security disabled" -ForegroundColor Green

      - name: 🔐 Enable RDP Service FIRST
        shell: powershell
        run: |
          Write-Host "Enabling RDP service..." -ForegroundColor Cyan
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue
          Start-Service -Name "RemoteRegistry" -ErrorAction SilentlyContinue
          
          Get-Service TermService | Wait-Service -Timeout 10
          Write-Host "✅ RDP service enabled and running" -ForegroundColor Green

      - name: 🔑 Create/Update RDP User
        shell: powershell
        run: |
          Write-Host "Setting up RDP user..." -ForegroundColor Cyan
          
          $pass = ConvertTo-SecureString "$env:RDP_PASS" -AsPlainText -Force
          Set-LocalUser -Name "Administrator" -Password $pass -ErrorAction SilentlyContinue
          Enable-LocalUser -Name "Administrator" -ErrorAction SilentlyContinue
          
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Administrator" -ErrorAction SilentlyContinue
          
          Write-Host "✅ RDP user configured" -ForegroundColor Green

      - name: 🌐 Install & Configure Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..." -ForegroundColor Cyan
          choco install tailscale -y 2>&1 | Out-Null
          Start-Sleep -Seconds 5
          
          $authKey = "${{ secrets.TAILSCALE_AUTH_KEY }}"
          
          if ($authKey -and $authKey -ne "true") {
            Write-Host "Using auth key..." -ForegroundColor Green
            & "C:\Program Files\Tailscale\tailscale.exe" up --hostname=gh-rdp-gaming --authkey=$authKey --accept-routes --accept-dns 2>&1 | Out-Null
          } else {
            Write-Host "No auth key - manual authorization required" -ForegroundColor Yellow
            $output = & "C:\Program Files\Tailscale\tailscale.exe" up --hostname=gh-rdp-gaming 2>&1
            Write-Host $output -ForegroundColor Yellow
          }
          
          # Wait for Tailscale to actually connect
          Write-Host "Waiting for Tailscale connection..." -ForegroundColor Cyan
          $attempts = 0
          while ($attempts -lt 30) {
            try {
              $status = & "C:\Program Files\Tailscale\tailscale.exe" status 2>&1
              if ($status -match "Active|Online" -and $status -notmatch "Offline") {
                Write-Host "✅ Tailscale connected!" -ForegroundColor Green
                break
              }
            } catch {}
            
            Start-Sleep -Seconds 2
            $attempts++
            Write-Host "Attempt $attempts/30..." -ForegroundColor Gray
          }

      - name: 🎮 Install Applications
        shell: powershell
        run: |
          Write-Host "Installing applications..." -ForegroundColor Cyan
          choco install steam -y 2>&1 | Out-Null
          choco install discord -y 2>&1 | Out-Null
          choco install googlechrome -y 2>&1 | Out-Null
          Write-Host "✅ All apps installed" -ForegroundColor Green

      - name: 📊 Get Connection Details
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
          Write-Host "Retrieving connection details..." -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
          
          $ip = ""
          $hostname = $env:COMPUTERNAME
          $pass = $env:RDP_PASS
          
          # Try to get IP with multiple attempts
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $result = & "C:\Program Files\Tailscale\tailscale.exe" ip -4 2>&1
              if ($result -and $result -notmatch "error|Error") {
                $ip = $result.Trim()
                if ($ip -match "^\d+\.\d+\.\d+\.\d+$") {
                  break
                }
              }
            } catch {}
            
            if ($ip -eq "") {
              Write-Host "Attempt $($i+1)/15 to get IP..." -ForegroundColor Gray
              Start-Sleep -Seconds 2
            }
          }
          
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║    🎮 RDP SERVER READY FOR CONNECTION 🎮  ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          if ($ip -ne "") {
            Write-Host "✅ IP Address:     $ip" -ForegroundColor Green
          } else {
            Write-Host "⚠️  IP Address:     Check https://login.tailscale.com" -ForegroundColor Yellow
          }
          
          Write-Host "🖥️  Hostname:       $hostname" -ForegroundColor Green
          Write-Host "🔌 Port:           3389" -ForegroundColor Green
          Write-Host "👤 Username:       Administrator" -ForegroundColor Green
          Write-Host "🔐 Password:       $pass" -ForegroundColor Green
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
          Write-Host "CONNECT WITH:" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
          Write-Host ""
          
          if ($ip -ne "") {
            Write-Host "Windows: mstsc /v:$ip`:3389" -ForegroundColor Cyan
            Write-Host "Mac: Open 'Microsoft Remote Desktop' → Add PC → $ip`:3389" -ForegroundColor Cyan
            Write-Host "Linux: rdesktop -u Administrator -p '$pass' $ip`:3389" -ForegroundColor Cyan
          } else {
            Write-Host "1. Go to: https://login.tailscale.com" -ForegroundColor Cyan
            Write-Host "2. Find device: $hostname" -ForegroundColor Cyan
            Write-Host "3. Get IP address from there" -ForegroundColor Cyan
            Write-Host "4. Connect via RDP with that IP" -ForegroundColor Cyan
          }
          
          Write-Host ""
          Write-Host "INSTALLED: Steam | Discord | Chrome" -ForegroundColor Green
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
          Write-Host ""

      - name: ♾️ Keep Session Running (6 Hours)
        shell: powershell
        run: |
          Write-Host "Session is now LIVE! Connect now." -ForegroundColor Green
          $start = Get-Date
          $max = New-TimeSpan -Hours 6
          
          while ((Get-Date) - $start -lt $max) {
            $elapsed = (Get-Date) - $start
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Session active - $($elapsed.Hours)h $($elapsed.Minutes)m elapsed" -ForegroundColor Gray
            Start-Sleep -Seconds 60
          }
          
          Write-Host "Session ended after 6 hours" -ForegroundColor Yellow
